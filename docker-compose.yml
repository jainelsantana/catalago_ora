services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=catalogdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalogdb"]
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: always
    networks:
      - app-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/catalogdb?schema=public
    command: ["sh", "-c", "npx prisma db push && npx prisma db seed"]
    restart: "no"
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/catalogdb?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-supersecretlocal}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3007}
    volumes:
      - uploads_data:/app/public/uploads
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:
  uploads_data:

networks:
  app-network:
    driver: bridge
