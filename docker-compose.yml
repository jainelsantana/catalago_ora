services:
  db:
    image: postgres:16-alpine
    ports:
      - "${COMPOSE_POSTGRES_PORT:-5432}:5432" # Exposes the database port only if needed for local debugging
    environment:
      - POSTGRES_USER=${COMPOSE_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${COMPOSE_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${COMPOSE_POSTGRES_DB:-catalogdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMPOSE_POSTGRES_USER:-postgres} -d ${COMPOSE_POSTGRES_DB:-catalogdb}"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    restart: always
    networks:
      - app-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://postgres:postgres@db:5432/catalogdb?schema=public}
    command: ["sh", "-c", "npx prisma db push && npx prisma db seed"]
    restart: "no"
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEB_PORT:-3007}:3007"
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://postgres:postgres@db:5432/catalogdb?schema=public}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3007}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-secret-change-me}
      NEXT_PUBLIC_UPLOAD_API_URL: ${NEXT_PUBLIC_UPLOAD_API_URL:-/api/upload}
      USE_COMPOSE_DATABASE_HOST: "true"
      RUNNING_IN_DOCKER: "true"
      SKIP_DB_BOOTSTRAP: "true"
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3007/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:
  uploads_data:

networks:
  app-network:
    driver: bridge
