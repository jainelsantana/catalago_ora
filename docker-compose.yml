services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3007}:3007"
    environment:
      DATABASE_URL: postgresql://catalogadmin:SecurePassw0rd2024@postgres:5432/catalogdb?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3007}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-secret-change-me}
      NEXT_PUBLIC_UPLOAD_API_URL: ${NEXT_PUBLIC_UPLOAD_API_URL:-/api/upload}
      USE_COMPOSE_DATABASE_HOST: "true"
      RUNNING_IN_DOCKER: "true"
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3007/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: always
    networks:
      - app-network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: catalogadmin
      POSTGRES_PASSWORD: SecurePassw0rd2024
      POSTGRES_DB: catalogdb
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalogadmin -d catalogdb"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:
  uploads_data:

networks:
  app-network:
    driver: bridge
