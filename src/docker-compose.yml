name: catalago_ora

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-catalogdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-catalogdb}"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    restart: always
    networks:
      - app-network

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    command: ["sh", "-c", "npx prisma db push && npx prisma db seed"]
    restart: "no"
    networks:
      - app-network

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEB_PORT:-3007}:3007"
    env_file:
      - ../.env
    environment:
      - USE_COMPOSE_DATABASE_HOST=true
      - RUNNING_IN_DOCKER=true
      - SKIP_DB_BOOTSTRAP=true
    volumes:
      - uploads_data:/app/public/uploads
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:
  uploads_data:

networks:
  app-network:
    driver: bridge
